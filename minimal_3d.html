<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think AI - Hierarchical Knowledge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            position: relative;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .interface {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
        }
        
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .messages {
            height: 300px;
            overflow-y: auto;
            margin-bottom: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.8);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        .message {
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.ai {
            text-align: left;
        }
        
        .message-content {
            display: inline-block;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }
        
        .user .message-content {
            background: rgba(0,150,255,0.2);
            border: 1px solid rgba(0,150,255,0.3);
        }
        
        .ai .message-content {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .input-container {
            display: flex;
            gap: 0.5rem;
        }
        
        #queryInput {
            flex: 1;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s ease;
        }
        
        #queryInput::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #queryInput:focus {
            border-color: rgba(0,150,255,0.5);
        }
        
        #sendBtn {
            padding: 0.75rem 1.5rem;
            background: rgba(0,150,255,0.3);
            border: 1px solid rgba(0,150,255,0.5);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        #sendBtn:hover {
            background: rgba(0,150,255,0.5);
            transform: translateY(-1px);
        }
        
        .title {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 10;
            font-size: 1.5rem;
            font-weight: 500;
            opacity: 0.9;
        }
        
        .loading {
            color: rgba(0,150,255,0.7);
            font-style: italic;
        }
        
        /* Scrollbar styling */
        .messages::-webkit-scrollbar {
            width: 4px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="title">Think AI 🧠</div>
    
    <canvas id="canvas"></canvas>
    
    <div class="interface">
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="message-content">
                        Hello! I'm Think AI with hierarchical knowledge. Ask me about any topic for exponentially deeper exploration. 🌳
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="queryInput" 
                    placeholder="Ask about music, physics, philosophy, or any topic..."
                    autocomplete="off"
                >
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        // 3D Canvas Animation
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Quantum field simulation
        const fieldPoints = [];
        const fieldDensity = 25; // Reduced for performance
        const time = { value: 0 };
        
        class QuantumFieldPoint {
            constructor(x, y) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.energy = 0;
                this.phase = Math.random() * Math.PI * 2;
                this.frequency = 0.0005 + Math.random() * 0.0005; // Very slow oscillation
                this.amplitude = 15 + Math.random() * 10;
            }
            
            update(t) {
                // Quantum field oscillation - slower and more wave-like
                this.energy = Math.sin(t * this.frequency + this.phase) * 0.3 + 0.7;
                
                // Wave interference pattern
                const waveX = Math.sin(this.baseX * 0.01 + t * 0.0001) * this.amplitude;
                const waveY = Math.cos(this.baseY * 0.01 + t * 0.0001) * this.amplitude;
                
                this.x = this.baseX + waveX * 0.3;
                this.y = this.baseY + waveY * 0.3;
            }
            
            draw() {
                // Draw quantum field fluctuations as glowing points
                const intensity = this.energy;
                const size = 1 + intensity * 2;
                const alpha = intensity * 0.4;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Quantum field color spectrum - blue to violet
                const hue = 240 + intensity * 60; // Blue to violet range
                ctx.fillStyle = `hsl(${hue}, 80%, ${60 + intensity * 20}%)`;
                
                // Draw field point with quantum glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                // Add quantum field glow effect
                ctx.globalAlpha = alpha * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // Initialize quantum field grid
        function initializeQuantumField() {
            fieldPoints.length = 0;
            const spacingX = canvas.width / fieldDensity;
            const spacingY = canvas.height / fieldDensity;
            
            for (let x = 0; x < fieldDensity; x++) {
                for (let y = 0; y < fieldDensity; y++) {
                    const pointX = x * spacingX + spacingX / 2;
                    const pointY = y * spacingY + spacingY / 2;
                    fieldPoints.push(new QuantumFieldPoint(pointX, pointY));
                }
            }
        }
        
        // Draw field connections (wave interference)
        function drawFieldConnections() {
            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.3)';
            ctx.lineWidth = 0.5;
            
            // Draw subtle connections between nearby field points
            for (let i = 0; i < fieldPoints.length; i += 3) { // Reduced frequency
                const point = fieldPoints[i];
                
                for (let j = i + 1; j < Math.min(i + 4, fieldPoints.length); j++) {
                    const other = fieldPoints[j];
                    const distance = Math.sqrt((point.x - other.x) ** 2 + (point.y - other.y) ** 2);
                    
                    if (distance < 80 && Math.abs(point.energy - other.energy) < 0.3) {
                        ctx.beginPath();
                        ctx.moveTo(point.x, point.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.stroke();
                    }
                }
            }
            ctx.restore();
        }
        
        initializeQuantumField();
        
        // Slower, scientifically-inspired animation loop
        function animate() {
            // Subtle fade instead of hard clear
            ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            time.value += 1; // Much slower time progression
            
            // Update and draw quantum field
            fieldPoints.forEach(point => {
                point.update(time.value);
                point.draw();
            });
            
            // Draw field wave connections
            if (time.value % 3 === 0) { // Only draw connections occasionally for performance
                drawFieldConnections();
            }
            
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initializeQuantumField(); // Reinitialize field for new dimensions
        });
        
        // Chat functionality
        const messages = document.getElementById('messages');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        
        function addMessage(content, isUser = false) {
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            message.appendChild(messageContent);
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addLoadingMessage() {
            const message = document.createElement('div');
            message.className = 'message ai loading';
            message.id = 'loading-message';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = 'Thinking...';
            
            message.appendChild(messageContent);
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
            
            return message;
        }
        
        function removeLoadingMessage() {
            const loading = document.getElementById('loading-message');
            if (loading) loading.remove();
        }
        
        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;
            
            addMessage(query, true);
            queryInput.value = '';
            
            const loadingMsg = addLoadingMessage();
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                removeLoadingMessage();
                addMessage(data.response);
                
            } catch (error) {
                removeLoadingMessage();
                addMessage('Sorry, I encountered an error. Please try again.');
                console.error('Error:', error);
            }
        }
        
        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuery();
        });
        
        // Focus input on load
        queryInput.focus();
    </script>
</body>
</html>
