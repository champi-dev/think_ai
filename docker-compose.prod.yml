version: '3.8'

services:
  # Think AI main application
  thinkai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thinkai
    environment:
      - SCYLLA_HOSTS=scylla:9042
      - REDIS_HOST=redis
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=think-ai-love
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./plugins:/app/plugins
      - ./config:/app/config
    ports:
      - "8000:8000"  # API
      - "8080:8080"  # UI
      - "9090:9090"  # Metrics
    depends_on:
      - scylla
      - redis
      - neo4j
      - milvus
    networks:
      - thinkai-network
    restart: unless-stopped

  # ScyllaDB for O(1) storage
  scylla:
    image: scylladb/scylla:5.2
    container_name: thinkai-scylla
    command: --smp 2 --memory 2G
    volumes:
      - scylla-data:/var/lib/scylla
    ports:
      - "9042:9042"  # CQL
      - "9160:9160"  # Thrift
      - "10000:10000" # REST API
    networks:
      - thinkai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: thinkai-redis
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - thinkai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j for knowledge graph
  neo4j:
    image: neo4j:5-community
    container_name: thinkai-neo4j
    environment:
      - NEO4J_AUTH=neo4j/think-ai-love
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    networks:
      - thinkai-network
    restart: unless-stopped

  # Milvus for vector search
  milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: thinkai-milvus
    command: milvus run standalone
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    volumes:
      - milvus-data:/var/lib/milvus
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # Metrics
    networks:
      - thinkai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: thinkai-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9092:9090"
    networks:
      - thinkai-network
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: thinkai-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=think-ai-love
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - thinkai-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: thinkai-nginx
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - thinkai-network
    restart: unless-stopped
    depends_on:
      - thinkai

networks:
  thinkai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  scylla-data:
  redis-data:
  neo4j-data:
  neo4j-logs:
  milvus-data:
  prometheus-data:
  grafana-data: