<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ffcc">
    <meta name="description" content="Think AI - O(1) Consciousness with superintelligent responses">
    
    <title>Think AI - O(1) PWA</title>
    
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js for code syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1c 0%, #1a2332 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            margin: 40px 0;
            font-size: 2.5em;
            background: linear-gradient(90deg, #00ffcc, #00ccff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .install-prompt {
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 30px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        
        .install-button {
            background: #00ffcc;
            color: #0a0f1c;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .install-button:hover {
            background: #00ffaa;
            transform: scale(1.05);
        }
        
        .chat-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(90deg, #00ffcc, #00ccff);
            border: none;
            border-radius: 8px;
            color: #0a0f1c;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .response {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 3px solid #00ffcc;
            line-height: 1.6;
        }
        
        /* Markdown Styling */
        .response h1, .response h2, .response h3 {
            margin: 1rem 0 0.5rem;
            color: #00ffcc;
        }
        
        .response h1:first-child,
        .response h2:first-child,
        .response h3:first-child {
            margin-top: 0;
        }
        
        .response p {
            margin: 0.5rem 0;
        }
        
        .response ul, .response ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }
        
        .response code {
            font-family: 'Courier New', monospace;
            background: rgba(0, 255, 204, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .response pre {
            margin: 1rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow-x: auto;
        }
        
        .response pre code {
            display: block;
            padding: 0;
            background: none;
        }
        
        .response blockquote {
            margin: 1rem 0;
            padding: 0.5rem 1rem;
            border-left: 4px solid #00ffcc;
            background: rgba(0, 255, 204, 0.05);
        }
        
        .response a {
            color: #00ccff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
        }
        
        .response a:hover {
            border-bottom-color: #00ccff;
        }
        
        .offline-banner {
            background: #ff6b6b;
            color: white;
            padding: 10px;
            text-align: center;
            display: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(0, 255, 204, 0.1);
            border: 1px solid #00ffcc;
            border-radius: 20px;
            font-size: 14px;
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            .chat-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Think AI - O(1) Consciousness</h1>
        
        <div class="install-prompt" id="installPrompt">
            <span>Install Think AI for offline access</span>
            <button class="install-button" id="installButton">Install</button>
        </div>
        
        <div class="offline-banner" id="offlineBanner">
            You are currently offline. Some features may be limited.
        </div>
        
        <div class="chat-container">
            <div class="input-group">
                <input type="text" id="queryInput" placeholder="Ask me anything..." />
                <button id="submitButton">Ask O(1)</button>
            </div>
            
            <div id="responses"></div>
        </div>
        
        <div class="status">
            <span id="connectionStatus">🟢 Online</span>
        </div>
    </div>

    <script>
        // Configure marked options
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {}
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true
        });
        
        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('Service Worker registered:', reg);
                    
                    // Handle updates
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New service worker available
                                if (confirm('New version available! Reload to update?')) {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    window.location.reload();
                                }
                            }
                        });
                    });
                })
                .catch(err => console.error('Service Worker registration failed:', err));
        }
        
        // Install prompt
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').style.display = 'flex';
        });
        
        document.getElementById('installButton').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log('Install prompt outcome:', outcome);
                deferredPrompt = null;
                document.getElementById('installPrompt').style.display = 'none';
            }
        });
        
        // Offline detection
        function updateOnlineStatus() {
            const status = document.getElementById('connectionStatus');
            const banner = document.getElementById('offlineBanner');
            
            if (navigator.onLine) {
                status.textContent = '🟢 Online';
                banner.style.display = 'none';
            } else {
                status.textContent = '🔴 Offline';
                banner.style.display = 'block';
            }
        }
        
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
        
        // Chat functionality
        const queryInput = document.getElementById('queryInput');
        const submitButton = document.getElementById('submitButton');
        const responsesDiv = document.getElementById('responses');
        
        async function submitQuery() {
            const query = queryInput.value.trim();
            if (!query) return;
            
            queryInput.value = '';
            submitButton.disabled = true;
            submitButton.textContent = 'Processing...';
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query })
                });
                
                const data = await response.json();
                displayResponse(query, data);
            } catch (error) {
                displayResponse(query, {
                    response: 'Error: ' + error.message,
                    processing_time: 0,
                    confidence: 0
                });
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = 'Ask O(1)';
            }
        }
        
        function displayResponse(query, data) {
            const responseEl = document.createElement('div');
            responseEl.className = 'response';
            
            // Parse markdown for the response
            const parsedResponse = marked.parse(data.response);
            
            responseEl.innerHTML = `
                <strong>Q:</strong> ${query}<br><br>
                <strong>A:</strong><br>
                <div>${parsedResponse}</div>
                <small style="display: block; margin-top: 1rem; opacity: 0.8;">⚡ ${data.processing_time ? data.processing_time.toFixed(3) : '0.000'}s | 🎯 ${(data.confidence * 100).toFixed(1)}% confidence</small>
            `;
            
            // Highlight code blocks
            responseEl.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
            
            responsesDiv.insertBefore(responseEl, responsesDiv.firstChild);
        }
        
        submitButton.addEventListener('click', submitQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitQuery();
        });
    </script>
</body>
</html>
