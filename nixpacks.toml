[phases.setup]
nixPkgs = ["python311", "gcc", "python311Packages.pip", "python311Packages.virtualenv"]

[phases.install]
cmds = [
    "python3 -m venv /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip",
    ". /opt/venv/bin/activate && pip install -r requirements.txt"
]

[phases.build]
cmds = ["echo 'Build phase complete'"]

[start]
cmd = "/opt/venv/bin/python -u think_ai_minimal.py"

[variables]
NIXPACKS_PYTHON_VERSION = "3.11"
NIXPACKS_DISABLE_CACHE = "1"
