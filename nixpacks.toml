# O(1) Ultra nixpacks configuration for 10-second Railway deployments
# Complexity: O(1) through pre-built cache bundles
# Beauty: Minimal, elegant, and blazing fast

[phases.setup]
# Minimal setup - only essential tools
nixPkgs = ["python311", "gcc", "xz", "bc", "jq"]

# O(1) cache environment variables
[variables]
O1_CACHE_DIR = "/cache/think-ai"
O1_BUNDLE_HASH = "auto"
O1_PARALLEL_JOBS = "8"
PIP_NO_CACHE_DIR = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"
PYTHONDONTWRITEBYTECODE = "1"
PYTHONUNBUFFERED = "1"

[phases.install]
# O(1) installation - no network calls, pure local operations
cmds = [
    # Single line command to avoid Dockerfile parsing issues
    "if [ -f \"$O1_CACHE_DIR/bundles/ultra-bundle-*.tar.xz\" ]; then echo '🚀 O(1) Ultra Cache detected' && chmod +x o1_ultra_deploy.sh && ./o1_ultra_deploy.sh; else echo '⚠️ No cache found - building first' && pip install --no-cache-dir pip-tools pipdeptree && python o1_ultra_cache.py --requirements requirements-full.txt && ./o1_ultra_deploy.sh; fi"
]

# Watch only the requirements file for changes
dependsOn = ["requirements-full.txt"]

[phases.build]
# No build phase needed - everything is pre-built
cmds = ["echo '✅ O(1) build complete - all dependencies cached'"]

[start]
# Start with Think AI optimizations enabled
cmd = "export THINK_AI_O1_MODE=true && export THINK_AI_COLOMBIAN_MODE=true && export THINK_AI_CACHE_EVERYTHING=true && python think_ai_full.py"

# Railway-specific optimizations
[deploy]
startupTimeoutSeconds = 30  # We only need 10 seconds
healthcheckPath = "/health"
healthcheckTimeoutSeconds = 5

# Cache persistence configuration
[[mounts]]
source = "think-ai-cache"
destination = "/cache/think-ai"