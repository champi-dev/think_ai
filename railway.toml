# Railway Configuration for Think AI API Server
# Elite deployment configuration with O(1) performance optimization

[build]
# Use our optimized Dockerfile instead of Nixpacks
dockerfilePath = "configs/Dockerfile"

[deploy]
# Service configuration
numReplicas = 1
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on-failure"
restartPolicyMaxRetries = 3

# Resource limits for optimal performance
cpu = 1
memory = 512

# Environment variable configuration
[deploy.env]
PORT = 8080
WORKERS = 4
PYTHONUNBUFFERED = 1
PYTHONDONTWRITEBYTECODE = 1
PYTHONOPTIMIZE = 2
TOKENIZERS_PARALLELISM = false

# Build-time arguments
[build.args]
DEPENDENCY_HASH = "{{ RAILWAY_GIT_COMMIT_SHA }}"

# Static file serving (if needed)
[static]
enabled = false