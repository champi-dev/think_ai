[build]
nixpacksPlan = "rust"
rustVersion = "1.82"

[deploy]
buildCommand = "cargo build --release --bin think-ai --bin think-ai-coding --bin think-ai-demos --bin think-ai-llm"
startCommand = "chmod +x start-server.sh && ./start-server.sh"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
