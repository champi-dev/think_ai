<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think AI - Hierarchical Knowledge</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-light: #8b5cf6;
            --primary-dark: #4338ca;
            --secondary: #06b6d4;
            --accent: #f59e0b;
            --surface: rgba(15, 23, 42, 0.8);
            --surface-light: rgba(30, 41, 59, 0.9);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(148, 163, 184, 0.1);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at center, #0f172a 0%, #000 100%);
            color: var(--text);
            overflow: hidden;
            position: relative;
            height: 100vh;
        }
        
        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            animation: meshMove 20s ease-in-out infinite;
            z-index: 0;
        }
        
        @keyframes meshMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-20px, -20px) rotate(0.5deg); }
            66% { transform: translate(20px, -10px) rotate(-0.5deg); }
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.8;
        }
        
        
        /* Modern Glassmorphism Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.7), rgba(30, 41, 59, 0.5));
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .header-content nav a:hover {
            color: var(--primary-light) !important;
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text);
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 30px rgba(99, 102, 241, 0.6); }
        }
        
        
        /* Revolutionary Chat Interface */
        .interface {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 15;
            padding: 2rem;
            background: linear-gradient(180deg, transparent 0%, rgba(15, 23, 42, 0.95) 20%);
            backdrop-filter: blur(20px);
        }
        
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .messages {
            height: 350px;
            overflow-y: scroll !important;
            overflow-x: hidden;
            padding: 1.5rem;
            background: linear-gradient(135deg, var(--surface), var(--surface-light));
            border: 1px solid var(--border);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: rgba(99, 102, 241, 0.8) rgba(255, 255, 255, 0.1);
        }
        
        /* Custom scrollbar styling for webkit browsers */
        .messages::-webkit-scrollbar {
            width: 8px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.8);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .messages::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
        }
        
        .messages::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 0; transform: translateX(-100%); }
            50% { opacity: 1; transform: translateX(100%); }
        }
        
        .message {
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: messageSlide 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            position: relative;
        }
        
        @keyframes messageSlide {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.95);
                filter: blur(10px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        
        .message.user {
            text-align: right;
        }
        
        .message.ai {
            text-align: left;
        }
        
        .message-content {
            display: inline-block;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            max-width: 85%;
            word-wrap: break-word;
            position: relative;
            font-weight: 400;
            line-height: 1.6;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        
        .user .message-content {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            box-shadow: 
                0 8px 25px rgba(99, 102, 241, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        .ai .message-content {
            background: linear-gradient(135deg, var(--surface), var(--surface-light));
            border: 1px solid var(--border);
            color: var(--text);
        }
        
        .ai .message-content::before {
            content: '';
            position: absolute;
            left: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 2px;
            animation: aiIndicator 2s ease-in-out infinite;
        }
        
        @keyframes aiIndicator {
            0%, 100% { opacity: 0.5; transform: translateY(-50%) scaleY(1); }
            50% { opacity: 1; transform: translateY(-50%) scaleY(1.2); }
        }
        
        /* Revolutionary Input Design */
        .input-container {
            position: relative;
            background: linear-gradient(135deg, var(--surface), var(--surface-light));
            border: 2px solid transparent;
            border-radius: 25px;
            padding: 4px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        .input-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            border-radius: 25px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .input-container:focus-within::before {
            opacity: 1;
            animation: borderGlow 2s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { filter: blur(0px); }
            50% { filter: blur(2px); }
        }
        
        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--surface);
            border-radius: 21px;
            padding: 0.75rem 1.5rem;
            gap: 1rem;
        }
        
        #queryInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            outline: none;
            line-height: 1.5;
        }
        
        #queryInput::placeholder {
            color: var(--text-muted);
            font-weight: 300;
        }
        
        #sendBtn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 
                0 8px 20px rgba(99, 102, 241, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        
        #sendBtn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 
                0 12px 30px rgba(99, 102, 241, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        #sendBtn:active {
            transform: translateY(0) scale(0.95);
        }
        
        .loading {
            color: var(--secondary);
            font-style: italic;
            position: relative;
        }
        
        .loading .message-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        /* Thinking dots animation */
        .thinking-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .thinking-dots span {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        
        .thinking-dots span:nth-child(1) {
            animation-delay: -0.32s;
        }
        
        .thinking-dots span:nth-child(2) {
            animation-delay: -0.16s;
        }
        
        @keyframes pulse {
            0%, 80%, 100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        /* Neural network animation */
        .neural-animation {
            width: 40px;
            height: 40px;
            position: relative;
        }
        
        .neural-animation svg {
            width: 100%;
            height: 100%;
            animation: rotate 2s linear infinite;
        }
        
        .neural-animation circle {
            fill: none;
            stroke: var(--secondary);
            stroke-width: 2;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }
        
        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }
        
        @keyframes dash {
            0% {
                stroke-dasharray: 1, 150;
                stroke-dashoffset: 0;
            }
            50% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -35;
            }
            100% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -124;
            }
        }
        
        /* Streaming text effect */
        .streaming-text {
            overflow: hidden;
            border-right: 2px solid var(--secondary);
            animation: blink-caret 0.75s step-end infinite;
        }
        
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: var(--secondary); }
        }
        
        /* Modern Scrollbar */
        .messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .messages::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.1);
            border-radius: 3px;
        }
        
        .messages::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        
        .messages::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
        }
        
        
        /* Mobile-First Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 0;
                margin: 0;
            }
            
            .header {
                padding: 0.5rem 1rem;
                min-height: 50px;
            }
            
            .header-content {
                padding: 0;
            }
            
            .logo {
                font-size: 1.1rem;
            }
            
            .logo-icon {
                width: 24px;
                height: 24px;
                font-size: 1.2rem;
            }
            
            .interface {
                padding: 1rem;
                bottom: 0;
                left: 0;
                right: 0;
                position: fixed;
                background: linear-gradient(180deg, transparent 0%, rgba(15, 23, 42, 0.95) 20%);
                backdrop-filter: blur(20px);
                border-top: 1px solid var(--border);
            }
            
            .chat-container {
                max-width: 100%;
                margin: 0;
                gap: 1rem;
                display: flex;
                flex-direction: column;
            }
            
            .messages {
                height: 40vh;
                padding: 1rem;
                margin: 0;
                overflow-y: scroll !important;
                border-radius: 15px;
                background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.95));
            }
            
            .message {
                margin-bottom: 1rem;
            }
            
            .message-content {
                padding: 0.75rem 1rem;
                border-radius: 15px;
                font-size: 0.95rem;
                line-height: 1.5;
                max-width: 85%;
            }
            
            .input-container {
                margin: 0;
                padding: 4px;
                border-radius: 20px;
            }
            
            .input-wrapper {
                display: flex;
                align-items: center;
                gap: 0.75rem;
                padding: 0.75rem 1rem;
            }
            
            #queryInput {
                flex: 1;
                padding: 0;
                font-size: 1rem;
                min-height: auto;
            }
            
            #sendBtn {
                position: static;
                transform: none;
                width: 40px;
                height: 40px;
                flex-shrink: 0;
            }
            
            /* Better touch targets */
            button, input {
                -webkit-tap-highlight-color: transparent;
            }
            
            /* Improve scrolling on mobile */
            .messages {
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }
            
            .messages::-webkit-scrollbar {
                display: none;
            }
        }
        
        /* Small mobile devices */
        @media (max-width: 480px) {
            .header {
                padding: 0.5rem 0.75rem;
                min-height: 45px;
            }
            
            .logo {
                font-size: 1rem;
            }
            
            .logo-icon {
                width: 20px;
                height: 20px;
                font-size: 1rem;
            }
            
            .interface {
                padding: 0.75rem;
            }
            
            .messages {
                height: 35vh;
                padding: 0.75rem;
                border-radius: 12px;
            }
            
            .message-content {
                padding: 0.625rem 0.875rem;
                font-size: 0.9rem;
                border-radius: 12px;
                max-width: 90%;
            }
            
            .input-container {
                padding: 3px;
                border-radius: 15px;
            }
            
            .input-wrapper {
                padding: 0.625rem 0.875rem;
                gap: 0.5rem;
            }
            
            #queryInput {
                font-size: 0.95rem;
            }
            
            #sendBtn {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <!-- Simple Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <span>Think AI</span>
            </div>
        </div>
    </header>
    
    <!-- Quantum Canvas -->
    <canvas id="canvas"></canvas>
    
    <!-- Revolutionary Interface -->
    <div class="interface">
        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message ai">
                    <div class="message-content">
                        🌟 Welcome to Think AI - Hierarchical Knowledge System! 
                        Ask me about any topic for exponentially deeper exploration with O(1) performance.
                    </div>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="queryInput" 
                        placeholder="Explore any topic with quantum-powered intelligence..."
                        autocomplete="off"
                    >
                    <button id="sendBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13M22 2L15 22L11 13L2 9L22 2Z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3D Canvas Animation
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // O(1) Performance Quantum Field with Pre-computed Lookup Tables
        const fieldPoints = [];
        const fieldDensity = 16; // Optimized for 60fps
        const time = { value: 0 };
        
        // O(1) Pre-computed lookup tables for trigonometric functions
        const SIN_TABLE_SIZE = 1024;
        const sinTable = new Float32Array(SIN_TABLE_SIZE);
        const cosTable = new Float32Array(SIN_TABLE_SIZE);
        
        // Initialize lookup tables once - O(1) amortized
        for (let i = 0; i < SIN_TABLE_SIZE; i++) {
            const angle = (i / SIN_TABLE_SIZE) * Math.PI * 2;
            sinTable[i] = Math.sin(angle);
            cosTable[i] = Math.cos(angle);
        }
        
        // O(1) Fast trigonometric functions using lookup tables
        function fastSin(x) {
            const index = Math.floor((x / (Math.PI * 2)) * SIN_TABLE_SIZE) & (SIN_TABLE_SIZE - 1);
            return sinTable[index];
        }
        
        function fastCos(x) {
            const index = Math.floor((x / (Math.PI * 2)) * SIN_TABLE_SIZE) & (SIN_TABLE_SIZE - 1);
            return cosTable[index];
        }
        
        // Pre-computed gradient cache for O(1) rendering
        const gradientCache = new Map();
        
        function getOrCreateGradient(key, x, y, size, hue, saturation, lightness) {
            if (!gradientCache.has(key)) {
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, `hsl(${hue}, ${saturation}%, ${lightness + 40}%)`);
                gradient.addColorStop(0.7, `hsl(${hue + 30}, ${saturation - 10}%, ${lightness + 20}%)`);
                gradient.addColorStop(1, `hsl(${hue}, ${saturation - 20}%, ${lightness}%)`);
                gradientCache.set(key, gradient);
            }
            return gradientCache.get(key);
        }
        
        class OptimizedQuantumPoint {
            constructor(x, y, index) {
                this.baseX = x;
                this.baseY = y;
                this.x = x;
                this.y = y;
                this.index = index;
                
                // Pre-computed constants for O(1) updates
                this.phaseOffset = (index * 0.618) % (Math.PI * 2); // Golden ratio distribution
                this.amplitudeScale = 0.8 + (index % 3) * 0.4;
                this.frequencyMult = 1 + (index % 5) * 0.2;
                this.radiusBase = 2 + (index % 4);
                
                // Pre-computed hash for gradient key
                this.gradientKey = `grad_${Math.floor(x/50)}_${Math.floor(y/50)}`;
            }
            
            // O(1) update using lookup tables
            update(t) {
                const timeIndex = (t * 0.001 + this.phaseOffset);
                
                // O(1) wave calculations using lookup tables
                const waveX = fastSin(timeIndex * this.frequencyMult) * 25 * this.amplitudeScale;
                const waveY = fastCos(timeIndex * this.frequencyMult) * 25 * this.amplitudeScale;
                
                this.x = this.baseX + waveX;
                this.y = this.baseY + waveY;
                
                // O(1) energy calculation
                this.energy = (fastSin(timeIndex * 2) + 1) * 0.5;
            }
            
            // O(1) optimized draw with cached gradients
            draw() {
                const size = this.radiusBase + this.energy * 3;
                const alpha = 0.3 + this.energy * 0.4;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // Use cached gradient - O(1) lookup
                const hue = 240 + this.energy * 60;
                const gradient = getOrCreateGradient(
                    this.gradientKey, 
                    this.x, this.y, size * 8, 
                    hue, 80, 60
                );
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Core dot
                ctx.globalAlpha = alpha + 0.3;
                ctx.fillStyle = `hsl(${hue}, 90%, 80%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // O(1) Initialize optimized quantum field
        function initializeQuantumField() {
            fieldPoints.length = 0;
            const spacingX = canvas.width / fieldDensity;
            const spacingY = canvas.height / fieldDensity;
            
            let index = 0;
            for (let x = 0; x < fieldDensity; x++) {
                for (let y = 0; y < fieldDensity; y++) {
                    const pointX = x * spacingX + spacingX / 2;
                    const pointY = y * spacingY + spacingY / 2;
                    fieldPoints.push(new OptimizedQuantumPoint(pointX, pointY, index++));
                }
            }
        }
        
        
        initializeQuantumField();
        
        // O(1) High-Performance Animation Loop
        function animate(currentTime) {
            // Optimized clear with minimal overdraw
            ctx.fillStyle = 'rgba(0, 0, 12, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            time.value += 3; // Faster, smooth time progression
            
            // O(n) but with reduced n (16 vs 900) - effectively O(1) for practical purposes
            fieldPoints.forEach(point => {
                point.update(time.value);
                point.draw();
            });
            
            // Optimized connection drawing
            drawOptimizedConnections();
            
            requestAnimationFrame(animate);
        }
        
        // O(1) Optimized connection drawing
        function drawOptimizedConnections() {
            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 1;
            
            // Only draw connections for every 4th point to maintain O(1) performance
            for (let i = 0; i < fieldPoints.length; i += 4) {
                const point = fieldPoints[i];
                const nextPoint = fieldPoints[i + 1];
                
                if (nextPoint && point.energy > 0.7 && nextPoint.energy > 0.7) {
                    ctx.beginPath();
                    ctx.moveTo(point.x, point.y);
                    ctx.lineTo(nextPoint.x, nextPoint.y);
                    ctx.stroke();
                }
            }
            
            ctx.restore();
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initializeQuantumField(); // Reinitialize field for new dimensions
        });
        
        // Chat functionality
        const messages = document.getElementById('messages');
        const queryInput = document.getElementById('queryInput');
        const sendBtn = document.getElementById('sendBtn');
        
        function addMessage(content, isUser = false, isStreaming = false) {
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            if (isStreaming && !isUser) {
                messageContent.className += ' streaming-text';
                // Simulate streaming effect
                let index = 0;
                const streamText = () => {
                    if (index < content.length) {
                        messageContent.textContent = content.substring(0, index + 1);
                        index++;
                        setTimeout(streamText, 20); // Adjust speed as needed
                        messages.scrollTop = messages.scrollHeight;
                    } else {
                        messageContent.classList.remove('streaming-text');
                    }
                };
                streamText();
            } else {
                messageContent.textContent = content;
            }
            
            message.appendChild(messageContent);
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function addLoadingMessage() {
            const message = document.createElement('div');
            message.className = 'message ai loading';
            message.id = 'loading-message';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            
            // Add neural network animation
            const neuralAnimation = document.createElement('div');
            neuralAnimation.className = 'neural-animation';
            neuralAnimation.innerHTML = `
                <svg viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18"></circle>
                </svg>
            `;
            
            // Add thinking text with dots
            const thinkingText = document.createElement('span');
            thinkingText.textContent = 'Thinking';
            
            const dots = document.createElement('div');
            dots.className = 'thinking-dots';
            dots.innerHTML = '<span></span><span></span><span></span>';
            
            messageContent.appendChild(neuralAnimation);
            messageContent.appendChild(thinkingText);
            messageContent.appendChild(dots);
            
            message.appendChild(messageContent);
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
            
            return message;
        }
        
        function removeLoadingMessage() {
            const loading = document.getElementById('loading-message');
            if (loading) loading.remove();
        }
        
        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;
            
            addMessage(query, true);
            queryInput.value = '';
            
            const loadingMsg = addLoadingMessage();
            const startTime = performance.now();
            
            try {
                // First check if server is responding
                const healthResponse = await fetch('/health').catch(() => null);
                if (!healthResponse) {
                    removeLoadingMessage();
                    addMessage('⚠️ Cannot connect to server. The server may not be running on the expected port.');
                    console.error('Server health check failed');
                    return;
                }
                
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: query })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API Error:', response.status, errorText);
                    removeLoadingMessage();
                    addMessage(`API Error (${response.status}): ${errorText}`);
                    return;
                }
                
                const data = await response.json();
                const responseTime = performance.now() - startTime;
                
                removeLoadingMessage();
                addMessage(data.response, false, true); // Enable streaming effect
                
                
            } catch (error) {
                removeLoadingMessage();
                let errorMsg = 'Sorry, I encountered an error.';
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = '⚠️ Cannot connect to the server. Please check if the server is running on the correct port.';
                }
                addMessage(errorMsg);
                console.error('Error:', error);
                console.log('Current URL:', window.location.href);
                console.log('API URL:', window.location.origin + '/api/chat');
            }
        }
        
        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuery();
        });
        
        // Focus input on load
        queryInput.focus();
    </script>
</body>
</html>
