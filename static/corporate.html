<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think AI - Enterprise Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #0F172A;
            --secondary: #1E293B;
            --accent: #3B82F6;
            --accent-hover: #2563EB;
            --text-primary: #F8FAFC;
            --text-secondary: #CBD5E1;
            --text-muted: #64748B;
            --border: rgba(148, 163, 184, 0.1);
            --success: #10B981;
            --error: #EF4444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Subtle animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        /* Professional Header */
        .header {
            position: relative;
            z-index: 10;
            padding: 1.5rem 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        .logo:hover {
            transform: translateX(2px);
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--text-primary);
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            position: relative;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .chat-interface {
            width: 100%;
            max-width: 800px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
            animation: scaleIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .chat-header {
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid var(--border);
        }
        
        .chat-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .status-indicator {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        
        .chat-messages {
            height: 400px;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.05);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 3px;
            opacity: 0.5;
        }
        
        .message {
            margin-bottom: 1.5rem;
            animation: messageSlide 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
        }
        
        @keyframes messageSlide {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 12px;
            font-size: 0.9375rem;
            line-height: 1.6;
            max-width: 80%;
        }
        
        .message.user .message-content {
            background: var(--accent);
            color: white;
            margin-left: auto;
            animation: slideFromRight 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        @keyframes slideFromRight {
            from {
                transform: translateX(20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .message.ai .message-content {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            color: var(--text-primary);
            animation: slideFromLeft 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }
        
        @keyframes slideFromLeft {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.2s forwards;
        }
        
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
        
        /* Input Area */
        .chat-input-area {
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid var(--border);
        }
        
        .input-container {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.875rem 1rem;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .chat-input::placeholder {
            color: var(--text-muted);
        }
        
        .send-button {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0.875rem 1.5rem;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        
        .send-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .send-button:hover::before {
            width: 300px;
            height: 300px;
        }
        
        .send-button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .send-button:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }
        
        .send-icon {
            width: 16px;
            height: 16px;
        }
        
        /* Loading Animation */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: fit-content;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: typingDot 1.4s ease-in-out infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typingDot {
            0%, 60%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            30% {
                transform: scale(1.5);
                opacity: 0.6;
            }
        }
        
        /* Footer */
        .footer {
            position: relative;
            z-index: 10;
            padding: 2rem 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.875rem;
            animation: fadeIn 1s ease 0.6s both;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .nav-links {
                display: none;
            }
            
            .chat-interface {
                border-radius: 0;
                height: 100vh;
                max-width: 100%;
            }
            
            .main {
                padding: 0;
            }
            
            .chat-messages {
                height: calc(100vh - 200px);
            }
            
            .message-content {
                max-width: 90%;
            }
        }
        
        /* Smooth loading state */
        .skeleton {
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.5) 25%, rgba(59, 130, 246, 0.1) 50%, rgba(30, 41, 59, 0.5) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        
        @keyframes loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">
                    <div class="logo-icon">🤖</div>
                    <span>Think AI Enterprise</span>
                </a>
                <nav class="nav-links">
                    <a href="#" class="nav-link">Solutions</a>
                    <a href="#" class="nav-link">Platform</a>
                    <a href="#" class="nav-link">Resources</a>
                    <a href="#" class="nav-link">Contact</a>
                </nav>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="chat-interface">
                <div class="chat-header">
                    <h2 class="chat-title">
                        <span class="status-indicator"></span>
                        AI Assistant
                    </h2>
                </div>
                
                <div class="chat-messages" id="messages">
                    <div class="message ai">
                        <div class="message-content">
                            Welcome to Think AI Enterprise. I'm here to help you with any questions or tasks you may have. How can I assist you today?
                        </div>
                        <div class="message-meta">Just now</div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="input-container">
                        <input 
                            type="text" 
                            class="chat-input" 
                            id="chatInput"
                            placeholder="Type your message..."
                            autocomplete="off"
                        >
                        <button class="send-button" id="sendButton">
                            <span>Send</span>
                            <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>© 2025 Think AI Enterprise. All rights reserved.</p>
        </div>
    </footer>
    
    <script>
        // Configuration
        const API_URL = 'https://c0f90449ca08.ngrok.app/api/chat';
        
        // Elements
        const messagesContainer = document.getElementById('messages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');
        
        // Add message to chat
        function addMessage(content, isUser = false) {
            const message = document.createElement('div');
            message.className = `message ${isUser ? 'user' : 'ai'}`;
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            const messageMeta = document.createElement('div');
            messageMeta.className = 'message-meta';
            messageMeta.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            message.appendChild(messageContent);
            message.appendChild(messageMeta);
            messagesContainer.appendChild(message);
            
            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            return message;
        }
        
        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message ai';
            indicator.id = 'typing-indicator';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            
            for (let i = 0; i < 3; i++) {
                const dot = document.createElement('div');
                dot.className = 'typing-dot';
                typingDiv.appendChild(dot);
            }
            
            indicator.appendChild(typingDiv);
            messagesContainer.appendChild(indicator);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, true);
            chatInput.value = '';
            
            // Show typing indicator
            showTypingIndicator();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Remove typing indicator
                removeTypingIndicator();
                
                // Add AI response
                addMessage(data.response);
                
                // Log performance metrics
                if (data.response_time_ms) {
                    console.log(`Response time: ${data.response_time_ms.toFixed(2)}ms`);
                }
                
                if (data.o1_details) {
                    console.log('O(1) Performance Details:', data.o1_details);
                }
                
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage('Sorry, I encountered an error. Please check your connection and try again.');
            }
        }
        
        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Focus input on load
        chatInput.focus();
        
        // Add smooth scroll behavior
        messagesContainer.style.scrollBehavior = 'smooth';
    </script>
</body>
</html>
