# Elite Pre-commit Configuration with O(1) Performance
# Formats code automatically without blocking deployment

default_install_hook_types: [pre-commit]
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0

repos:
  # Local Think AI Elite Pipeline
  - repo: local
    hooks:
      - id: think-ai-pipeline
        name: Think AI Elite CI/CD Pipeline
        entry: scripts/pre-commit-local.sh
        language: system
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

  # Python Black Formatter - Auto-fix
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=120', '--target-version=py311']
        exclude: ^(venv/|\.venv/|build/|dist/|THINK_AI_DEPLOYMENT_)
        stages: [pre-commit]

  # Import Sorting - Auto-fix
  - repo: https://github.com/PyCQA/isort
    rev: 6.0.1
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=120']
        exclude: ^(venv/|\.venv/|build/|dist/)
        stages: [pre-commit]

  # Basic file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: ['--markdown-linebreak-ext=md']
      - id: end-of-file-fixer
        exclude: \.(jpg|png|gif|ico|jpeg)$
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
        exclude: (package-lock\.json|\.vscode/)
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  # Prettier for JS/TS (auto-fix)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        args: ['--write', '--single-quote', '--trailing-comma=es5']
        exclude: (package-lock\.json|\.next/|dist/|build/)
        additional_dependencies:
          - prettier@3.1.0
          - prettier-plugin-tailwindcss

  # Flake8 - Report only, no blocking
  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args:
          [
            '--max-line-length=120',
            '--extend-ignore=E203,E266,E501,W503,F403,F401',
            '--max-complexity=15',
            '--exclude=venv,.venv,build,dist,__pycache__,THINK_AI_DEPLOYMENT_*',
          ]
        # Continue on error
        always_run: false
        pass_filenames: true
        verbose: true
        stages: [manual] # Only run when explicitly called

# Don't block commits
