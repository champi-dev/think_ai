version: '3.8'

services:
  # ScyllaDB - Primary O(1) Storage
  scylla:
    image: scylladb/scylla:5.2
    container_name: think_ai_scylla
    ports:
      - "9042:9042"
      - "9160:9160"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --seeds=scylla --smp 2 --memory 2G
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis - High-performance Cache
  redis:
    image: redis:7-alpine
    container_name: think_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus - Vector Database
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: think_ai_milvus_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: think_ai_milvus_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: think_ai_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - milvus-etcd
      - milvus-minio

  # Neo4j - Knowledge Graph
  neo4j:
    image: neo4j:5-community
    container_name: think_ai_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/think_ai_2024
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Initialization container
  init:
    image: cassandra:latest
    container_name: think_ai_init
    depends_on:
      scylla:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts
    command: |
      bash -c "
        echo 'Waiting for ScyllaDB...'
        sleep 10
        echo 'Creating keyspace...'
        cqlsh scylla -e \"
          CREATE KEYSPACE IF NOT EXISTS think_ai 
          WITH replication = {
            'class': 'SimpleStrategy', 
            'replication_factor': 1
          };
        \"
        echo 'Keyspace created!'
      "

volumes:
  scylla_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: think_ai_network