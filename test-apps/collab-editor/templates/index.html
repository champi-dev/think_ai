<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Code Editor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #1e1e1e;
            color: #d4d4d4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #2d2d30;
            padding: 10px 20px;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        h1 {
            margin: 0;
            font-size: 20px;
            font-weight: normal;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6c757d;
        }
        .status-indicator.connected {
            background: #28a745;
        }
        .users {
            display: flex;
            gap: 5px;
        }
        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        #editor {
            flex: 1;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.5;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: none;
            outline: none;
            resize: none;
            overflow: auto;
        }
        .sidebar {
            width: 250px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            padding: 20px;
            overflow-y: auto;
        }
        .sidebar h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            text-transform: uppercase;
            color: #cccccc;
        }
        .chat-messages {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 8px;
            background: #1e1e1e;
            border-radius: 4px;
        }
        .chat-message .username {
            font-weight: bold;
            color: #569cd6;
            font-size: 12px;
        }
        .chat-message .text {
            font-size: 13px;
            margin-top: 2px;
        }
        .chat-input {
            display: flex;
            gap: 5px;
        }
        .chat-input input {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
        .chat-input button {
            background: #007acc;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .chat-input button:hover {
            background: #005a9e;
        }
        .language-selector {
            margin-top: 20px;
        }
        .language-selector select {
            width: 100%;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Collaborative Code Editor</h1>
        <div class="status">
            <div class="users" id="users"></div>
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>
    
    <div class="editor-container">
        <textarea id="editor" placeholder="// Start coding collaboratively..."></textarea>
        
        <div class="sidebar">
            <h3>Chat</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <form class="chat-input" id="chatForm">
                <input type="text" id="chatInput" placeholder="Type a message..." />
                <button type="submit">Send</button>
            </form>
            
            <div class="language-selector">
                <h3>Language</h3>
                <select id="languageSelect">
                    <option value="javascript">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="java">Java</option>
                    <option value="cpp">C++</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // WebSocket connection
        let ws = null;
        let userId = Math.random().toString(36).substr(2, 9);
        let username = `User${Math.floor(Math.random() * 1000)}`;
        let isTyping = false;
        let typingTimeout;
        
        const editor = document.getElementById('editor');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const usersDiv = document.getElementById('users');
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const chatInput = document.getElementById('chatInput');
        const languageSelect = document.getElementById('languageSelect');
        
        // User colors for avatars
        const userColors = ['#e06c75', '#98c379', '#61afef', '#c678dd', '#e5c07b', '#56b6c2'];
        const userColorMap = {};
        
        function getColorForUser(userId) {
            if (!userColorMap[userId]) {
                userColorMap[userId] = userColors[Object.keys(userColorMap).length % userColors.length];
            }
            return userColorMap[userId];
        }
        
        function connect() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            
            ws.onopen = () => {
                statusIndicator.classList.add('connected');
                statusText.textContent = 'Connected';
                
                // Send join message
                ws.send(JSON.stringify({
                    type: 'join',
                    userId: userId,
                    username: username
                }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                switch (data.type) {
                    case 'content':
                        if (data.userId !== userId) {
                            editor.value = data.content;
                        }
                        break;
                    
                    case 'users':
                        updateUsers(data.users);
                        break;
                    
                    case 'chat':
                        addChatMessage(data.username, data.message);
                        break;
                    
                    case 'language':
                        if (data.userId !== userId) {
                            languageSelect.value = data.language;
                        }
                        break;
                }
            };
            
            ws.onclose = () => {
                statusIndicator.classList.remove('connected');
                statusText.textContent = 'Disconnected';
                setTimeout(connect, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
        }
        
        function updateUsers(users) {
            usersDiv.innerHTML = users.map(user => 
                `<div class="user-avatar" style="background-color: ${getColorForUser(user.userId)}" title="${user.username}">
                    ${user.username.charAt(0).toUpperCase()}
                </div>`
            ).join('');
        }
        
        function addChatMessage(username, message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            messageDiv.innerHTML = `
                <div class="username">${username}</div>
                <div class="text">${message}</div>
            `;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // Editor events
        editor.addEventListener('input', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                clearTimeout(typingTimeout);
                
                if (!isTyping) {
                    isTyping = true;
                    ws.send(JSON.stringify({
                        type: 'typing',
                        userId: userId,
                        typing: true
                    }));
                }
                
                ws.send(JSON.stringify({
                    type: 'content',
                    userId: userId,
                    content: editor.value
                }));
                
                typingTimeout = setTimeout(() => {
                    isTyping = false;
                    ws.send(JSON.stringify({
                        type: 'typing',
                        userId: userId,
                        typing: false
                    }));
                }, 500);
            }
        });
        
        // Chat events
        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const message = chatInput.value.trim();
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'chat',
                    userId: userId,
                    username: username,
                    message: message
                }));
                chatInput.value = '';
            }
        });
        
        // Language selector
        languageSelect.addEventListener('change', () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'language',
                    userId: userId,
                    language: languageSelect.value
                }));
            }
        });
        
        // Start connection
        connect();
    </script>
</body>
</html>
